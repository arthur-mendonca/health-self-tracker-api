services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: quantified_self
      POSTGRES_USER: health_tracker
      POSTGRES_PASSWORD: health_tracker_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U health_tracker -d quantified_self"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - backend

  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://health_tracker:health_tracker_password@db:5432/quantified_self
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend

volumes:
  postgres_data:

networks:
  backend:
    driver: bridge

